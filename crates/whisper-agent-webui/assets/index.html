<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>whisper-agent</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #1c1c1c;
            font-family: system-ui, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
    <script type="module">
        import init from '/pkg/whisper_agent_webui.js';
        init().catch(err => {
            console.error('failed to initialize whisper-agent-webui:', err);
            document.body.innerHTML =
                '<pre style="color:#fff;padding:1em;">webui failed to start. ' +
                'Did you run `wasm-pack build crates/whisper-agent-webui --target web`?\n\n' +
                String(err) + '</pre>';
        });
    </script>
</body>
</html>
