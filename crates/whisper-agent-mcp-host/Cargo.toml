[package]
name = "whisper-agent-mcp-host"
description = "MCP server exposing a controlled slice of POSIX surface for whisper-agent"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "whisper-agent-mcp-host"
path = "src/main.rs"

[dependencies]
axum = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "fs", "io-util", "signal", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
thiserror = "2"
anyhow = "1"
