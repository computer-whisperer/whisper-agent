name: release

# Tag-driven release workflow. On every `v*.*.*` tag push:
#   1. builds the Dockerfile and pushes the image to ghcr.io
#   2. builds a signed Android release APK
#   3. creates a GitHub Release, attaches the APK, and references the image
#
# The merge-gate workflows (ci.yml, android.yml) cover branch / PR validation
# and intentionally do NOT run on tag pushes — the tagged commit was already
# verified when it landed on main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of the release keystore (`base64 -w0 keystore.jks`)
#   ANDROID_KEYSTORE_PASSWORD  storepass used when generating the keystore
#   ANDROID_KEY_ALIAS          alias passed to `keytool -alias`
#   ANDROID_KEY_PASSWORD       keypass used when generating the keystore
#
# Container push uses the auto-provisioned GITHUB_TOKEN with `packages:write`.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # softprops/action-gh-release creates/updates releases
  packages: write   # docker push to ghcr.io

jobs:
  container:
    name: container image (ghcr.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags published:
      #   ghcr.io/<owner>/whisper-agent:vX.Y.Z   (always; matches git tag)
      #   ghcr.io/<owner>/whisper-agent:latest   (only on stable tags — a `-`
      #                                          in the tag name flags it as
      #                                          a prerelease and we skip)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/whisper-agent
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      # `mode=max` caches every stage, including the cargo-chef cook layer
      # where the bulk of compile time lives. Without it, only the final
      # image layers are cached and the rebuild cost stays high.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  android:
    name: Android release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      # Derive an Android `versionCode` from the semver tag so each release
      # APK installs over the previous one. `0.3.9` → 309. The formula
      # (major*10000 + minor*100 + patch) leaves headroom for major≤209,
      # minor≤99, patch≤99 — well clear of Android's 2.1B versionCode cap.
      # Prerelease suffixes (e.g. `v0.4.0-rc1`) are kept in versionName for
      # display but stripped before splitting on `.` so the math stays valid.
      - name: Compute version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          core="${version%%-*}"
          IFS='.' read -r major minor patch <<< "$core"
          version_code=$((10#$major * 10000 + 10#$minor * 100 + 10#$patch))
          # Android requires versionCode ≥ 1. Floor handles the v0.0.0
          # corner case (test tags) without disturbing real releases.
          if [ "$version_code" -lt 1 ]; then
            version_code=1
          fi
          echo "name=$version" >> "$GITHUB_OUTPUT"
          echo "code=$version_code" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Decode the keystore secret to a path outside the workspace so it
      # never lands in a build artifact or the gradle daemon's working
      # tree. Cleaned up automatically when the runner shuts down.
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is unset — see release.yml comment header for setup steps" >&2
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: assembleRelease
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }} \
            --no-daemon --stacktrace

      - name: Stage APK
        run: |
          src=android/app/build/outputs/apk/release/app-release.apk
          dst="whisper-agent-${{ steps.version.outputs.tag }}.apk"
          mv "$src" "$dst"
          echo "apk=$dst" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: whisper-agent-*.apk
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [container, android]
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts

      # Auto-creates the release if missing for this tag. `body` is
      # prepended to the auto-generated commit-log notes from
      # `generate_release_notes`.
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./artifacts/*.apk
          body: |
            ### Container image

            ```
            docker pull ghcr.io/${{ github.repository_owner }}/whisper-agent:${{ github.ref_name }}
            ```

            ### Android APK

            Attached below — sideload onto an Android 8.0+ device.
