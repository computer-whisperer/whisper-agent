name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Be loud about warnings — `cargo clippy -- -D warnings` covers the lints
  # but a plain `cargo build` won't. CI surfaces both.
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pin: jetli's `latest` resolution flipped to 0.9.1 (2021)
          # mid-day on 2026-05-07, breaking workspace inheritance
          # parsing. v0.13.1 is the upstream stable; bump after
          # verifying the action no longer regresses.
          version: 'v0.13.1'

      # `src/server.rs` embeds `crates/whisper-agent-aetna-ui/pkg/` via
      # `rust-embed`; the macro checks the folder exists at compile time.
      # `pkg/` is wasm-pack output and gitignored — we have to build it
      # here before clippy/test touch the host-side workspace. Debug
      # build is fine: CI only needs the files to exist so the embed
      # macro resolves; size and speed matter more than optimization.
      # (Was `whisper-agent-webui` until the egui frontend was dropped
      # in `chore: drop egui webui + desktop crates`; mirrors the path
      # `scripts/dev.sh` and the Dockerfile now use.)
      - name: Build aetna-ui (wasm-pack)
        run: wasm-pack build crates/whisper-agent-aetna-ui --target web

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: test
        run: cargo test --workspace --locked
