[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[package]
name = "whisper-agent"
description = "Server-resident agent loop that reaches into managed POSIX hosts via MCP"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "whisper-agent"
path = "src/main.rs"
