# Test bucket for the tracked-source / FeedDriver / WikipediaDriver path.
#
# Targets Simple English Wikipedia (simplewiki) — small enough to round-
# trip an end-to-end download + chunk + embed + index in under an hour
# on Qwen3-Embedding-0.6B per the validation runs in
# docs/progress_knowledge_db.md, but real enough to exercise every
# stage:
#
# - WikipediaDriver scrapes /simplewiki/ for the latest base snapshot,
#   downloads ~330 MB of pages-articles-multistream.xml.bz2 into
#   source-cache/base/<id>/, and persists current_base_snapshot_id to
#   feed-state.toml.
# - The standard MediaWikiXml adapter parses the cached file — same
#   path stored buckets use, just acquired by the driver instead of
#   pointed at by the user.
# - The standard chunker + dense + sparse pipeline takes it from there.
#
# Daily delta polling is *not* exercised by an initial build — that's
# the per-bucket worker (T4) which lands later. For now `delta_cadence`
# is just a config the worker will pick up when it exists; the value
# here is the intended steady-state cadence for this bucket.

name        = "Wikipedia (Simple English)"
description = "Simple English Wikipedia, tracked-source test bucket — exercises WikipediaDriver end-to-end on a small dataset."
created_at  = "2026-04-26T00:00:00Z"

[source]
kind           = "tracked"
driver         = "wikipedia"
language       = "simple"
delta_cadence  = "daily"
resync_cadence = "monthly"

[chunker]
strategy       = "token_based"
chunk_tokens   = 500
overlap_tokens = 50

[search_paths.dense]
enabled = true

[search_paths.sparse]
enabled   = true
tokenizer = "default"

[defaults]
embedder     = "qwen3_embed_0_6b"
serving_mode = "ram"
quantization = "f32"

[compaction]
delta_ratio_threshold     = 0.20
tombstone_ratio_threshold = 0.10
min_interval              = "6h"
max_interval              = "30d"
