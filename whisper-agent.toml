# whisper-agent backend catalog (example / in-repo fallback).
#
# Each entry is a named alias that tasks reference via TaskConfig.backend.
# Aliases are user-chosen; `kind` selects the wire-protocol impl
# (`anthropic`, `openai_chat`, ...). Credentials live in a per-entry
# `auth` block, tagged by `mode`:
#
#   auth = { mode = "api_key", value = "sk-..." }       # inline secret
#   auth = { mode = "api_key", env   = "MY_API_KEY" }   # env-var lookup
#
# The real user-facing catalog lives at ~/.config/whisper-agent/whisper-agent.toml;
# this file stays in-repo as a non-secret template. `env`-form entries here let
# the dev loop pick up secrets injected by the shell without committing them.

default_backend = "gemma-4"

[backends.anthropic]
kind = "anthropic"
default_model = "claude-sonnet-4-6"
auth = { mode = "api_key", env = "ANTHROPIC_API_KEY" }

# OpenAI Responses API — the new production primitive. Stateless mode by
# default (full input array each turn; no previous_response_id).
#
# Standard API key:
# [backends.openai]
# kind = "openai_responses"
# default_model = "gpt-5"
# auth = { mode = "api_key", env = "OPENAI_API_KEY" }
#
# ChatGPT Plus/Pro subscription (reads ~/.codex/auth.json, refreshes on demand):
# [backends.openai-pro]
# kind = "openai_responses"
# default_model = "gpt-5"
# auth = { mode = "chatgpt_subscription", source = "codex" }

# Hosted llama.cpp server running Gemma-4 26B (UD-Q4_K_M). Uses the OpenAI
# Chat Completions shape that llama.cpp exposes at /v1/chat/completions. No
# auth required.
[backends.gemma-4]
kind = "openai_chat"
base_url = "https://llama-gemma-4.cjbal.com/v1"

[backends.deepseek-r1]
kind = "openai_chat"
base_url = "https://llama-deepseek-r1.cjbal.com/v1"

[backends.deepseek-v3]
kind = "openai_chat"
base_url = "https://llama-deepseek-v3.cjbal.com/v1"

[backends.mistral-3]
kind = "openai_chat"
base_url = "https://llama-mistral-3.cjbal.com/v1"
